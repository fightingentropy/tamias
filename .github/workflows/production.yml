name: Production

permissions:
  contents: read

on:
  push:
    branches:
      - main

concurrency:
  group: production-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      has_affected: ${{ steps.affected.outputs.has_affected }}
      dashboard: ${{ steps.affected.outputs.dashboard }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: ./.github/actions/setup

      - name: Detect affected services
        id: affected
        env:
          CI_AFFECTED_BASE: ${{ github.event.before }}
          CI_AFFECTED_HEAD: ${{ github.sha }}
        run: bun run ci:affected

  validate:
    name: Validate
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected == 'true'
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - uses: ./.github/actions/setup

      - name: Lint, typecheck, and test workspaces
        run: bun run lint && bun run typecheck && bun run test

  deploy-dashboard:
    name: Deploy Dashboard
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.dashboard == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-dashboard-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Dashboard to Cloudflare
        run: bun run deploy:cloudflare:dashboard:production
