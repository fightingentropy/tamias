name: Staging

permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  detect-changes:
    name: Detect changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    env:
      TURBO_SCM_BASE: origin/main
    outputs:
      has_affected: ${{ steps.affected.outputs.has_affected }}
      api: ${{ steps.affected.outputs.api }}
      dashboard: ${{ steps.affected.outputs.dashboard }}
      worker: ${{ steps.affected.outputs.worker }}
      website: ${{ steps.affected.outputs.website }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Detect affected services
        id: affected
        run: |
          AFFECTED=$(bunx turbo build --affected --dry-run=json 2>/dev/null | jq -r '.packages[]' 2>/dev/null || echo "")
          echo "Affected packages: $AFFECTED"
          echo "has_affected=$([[ -n "$AFFECTED" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "api=$(echo "$AFFECTED" | grep -q '@tamias/api' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "dashboard=$(echo "$AFFECTED" | grep -q '@tamias/dashboard' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "worker=$(echo "$AFFECTED" | grep -q '@tamias/worker' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"
          echo "website=$(echo "$AFFECTED" | grep -q '@tamias/website' && echo 'true' || echo 'false')" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected == 'true'
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      TURBO_SCM_BASE: origin/main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint, typecheck, and test affected workspaces
        run: bunx turbo run lint typecheck test --affected

  deploy-api-staging:
    name: Deploy API (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.api == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-api-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy API to Cloudflare staging
        run: bun run deploy:cloudflare:api:staging

  deploy-dashboard-staging:
    name: Deploy Dashboard (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.dashboard == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-dashboard-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Dashboard to Cloudflare staging
        run: bun run deploy:cloudflare:dashboard:staging

  deploy-worker-staging:
    name: Deploy Worker (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.worker == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    concurrency: cloudflare-worker-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Worker to Cloudflare staging
        run: bun run deploy:cloudflare:worker:staging

  deploy-website-staging:
    name: Deploy Website (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.website == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-website-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Website to Cloudflare staging
        run: bun run deploy:cloudflare:website:staging
