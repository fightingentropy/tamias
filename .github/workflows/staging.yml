name: Staging

permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint, typecheck, and test workspaces
        run: bun run lint && bun run typecheck && bun run test

  deploy-dashboard-staging:
    name: Deploy Dashboard (staging)
    needs: validate
    if: needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency: cloudflare-dashboard-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Dashboard to Cloudflare staging
        run: bun run deploy:cloudflare:dashboard:staging
