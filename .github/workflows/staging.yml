name: Staging

permissions:
  contents: read

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changes
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      has_affected: ${{ steps.affected.outputs.has_affected }}
      api: ${{ steps.affected.outputs.api }}
      dashboard: ${{ steps.affected.outputs.dashboard }}
      worker: ${{ steps.affected.outputs.worker }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Detect affected services
        id: affected
        env:
          CI_AFFECTED_BASE: origin/main
        run: bun run ci:affected

  validate:
    name: Validate
    runs-on: blacksmith-16vcpu-ubuntu-2404
    needs: detect-changes
    if: needs.detect-changes.outputs.has_affected == 'true'
    timeout-minutes: 20
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Lint, typecheck, and test workspaces
        run: bun run lint && bun run typecheck && bun run test

  deploy-api-staging:
    name: Deploy API (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.api == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-api-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy API to Cloudflare staging
        run: bun run deploy:cloudflare:api:staging

  deploy-dashboard-staging:
    name: Deploy Dashboard (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.dashboard == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 20
    concurrency: cloudflare-dashboard-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Dashboard to Cloudflare staging
        run: bun run deploy:cloudflare:dashboard:staging

  deploy-worker-staging:
    name: Deploy Worker (staging)
    needs: [detect-changes, validate]
    if: >-
      always() &&
      needs.validate.result == 'success' &&
      needs.detect-changes.outputs.worker == 'true'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 30
    concurrency: cloudflare-worker-staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Deploy Worker to Cloudflare staging
        run: bun run deploy:cloudflare:worker:staging
