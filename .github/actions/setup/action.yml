name: Setup
description: Setup Bun, cache dependencies, and install

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: v1.3.11

    - name: Cache bun dependencies
      uses: actions/cache@v4
      with:
        key: ${{ github.repository }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: ${{ github.repository }}-bun-
        path: |
          ~/.bun/install/cache
          node_modules

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
